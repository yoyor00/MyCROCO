# MS3DVAR WOOM Host Configuration
# =================================
#
# Define one host section per machine (or class of machines).
# Each section declares the ms3dvar_compile environment used by the
# compilation tasks (compile_mpc, compile_filter, compile_lr, compile_mr, compile_ms).
#
# The ms3dvar_compile env sets all compiler and NetCDF variables so that
# tasks.cfg commandlines need no FC detection or nf-config calls.
#
# Variables expected by tasks.cfg and bin/ms3dvar_compile.sh:
#   MS3DVAR_SRC : absolute path to ASSIM/MS3DVAR
#   CROCO_SRC   : absolute path to CROCO OCEAN source
#   FC          : Fortran compiler binary
#   CPP1        : C preprocessor command with flags (DLinux, DIfort, etc.)
#   CFT1        : Fortran compiler (same as FC, used in Makedefs template)
#   FFLAGS1     : Fortran compilation flags (optimization + real size + OpenMP + NetCDF include)
#   CPPFLAGS1   : CPP flags (= NetCDF include path, used for .F preprocessing)
#   LDFLAGS1    : Linker flags (= NetCDF library flags)
#   NPROCS      : Number of parallel make jobs


# ------------------------------------------------------------------
# Local workstation — gfortran
# ------------------------------------------------------------------

[local]

    [[envs]]

        [[[ms3dvar_compile]]]

            [[[[vars]]]]

                [[[[[set]]]]]

                MS3DVAR_SRC=/path/to/ASSIM/MS3DVAR
                CROCO_SRC=/path/to/OCEAN
                FC=gfortran
                CPP1=cpp -traditional -DLinux
                CFT1=gfortran
                # -fopenmp: remove if OPENMP is not defined in cppdefs.h
                FFLAGS1=-O2 -mcmodel=medium -fdefault-real-8 -fdefault-double-8 -std=legacy -fopenmp -I/usr/include/netcdf
                CPPFLAGS1=-I/usr/include/netcdf
                LDFLAGS1=-L/usr/lib/x86_64-linux-gnu -lnetcdff -lnetcdf
                # parallel make (NPROCS>1) may fail due to buffer.mod race condition
                NPROCS=1


# ------------------------------------------------------------------
# Datarmor (Ifremer HPC) — Intel oneAPI
# ------------------------------------------------------------------

[datarmor]
patterns=datavisu*,*.ifremer.fr,datarmor*
scheduler=pbspro
module_setup=. /etc/profile.d/modules.sh

    [[queues]]
    seq=sequentiel
    omp=omp

    [[dirs]]
    scratch=$SCRATCH

    [[envs]]

        [[[ms3dvar_compile]]]

            [[[[modules]]]]
            load=netcdf4-fortran/intel/4.6.1 intel/oneAPI/2024

            [[[[vars]]]]

                [[[[[set]]]]]

                MS3DVAR_SRC=/path/to/ASSIM/MS3DVAR
                CROCO_SRC=/path/to/OCEAN
                FC=ifort
                CPP1=cpp -traditional -DLinux -DIfort
                CFT1=ifort
                FFLAGS1=-O2 -mcmodel=medium -fno-alias -i4 -r8 -fp-model precise -qopenmp -I${NETCDF_INC_PATH}
                CPPFLAGS1=-I${NETCDF_INC_PATH}
                LDFLAGS1=-L${NETCDF_LIB_PATH} -lnetcdff -lnetcdf
                NPROCS=8
